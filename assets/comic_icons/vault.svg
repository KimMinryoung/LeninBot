<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Floor shadow -->
  <ellipse cx="50" cy="94" rx="34" ry="3" fill="#2d343644"/>
  <!-- Vault body -->
  <rect x="12" y="14" width="76" height="78" rx="4" fill="#95a5a6" stroke="#2d3436" stroke-width="3"/>
  <!-- Left hinges -->
  <rect x="8" y="26" width="6" height="10" fill="#2d3436"/>
  <rect x="8" y="68" width="6" height="10" fill="#2d3436"/>
  <!-- Top label -->
  <text x="50" y="24" font-family="system-ui, sans-serif" font-size="8" font-weight="800" fill="#2d3436" text-anchor="middle">BANK</text>
  <!-- Door circle -->
  <circle cx="50" cy="56" r="22" fill="#bdc3c7" stroke="#2d3436" stroke-width="2.5"/>
  <!-- Handle bars (spokes) -->
  <line x1="50" y1="34" x2="50" y2="78" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="56" x2="72" y2="56" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle end caps -->
  <circle cx="50" cy="34" r="2.5" fill="#2d3436"/>
  <circle cx="50" cy="78" r="2.5" fill="#2d3436"/>
  <circle cx="28" cy="56" r="2.5" fill="#2d3436"/>
  <circle cx="72" cy="56" r="2.5" fill="#2d3436"/>
  <!-- Center dial -->
  <circle cx="50" cy="56" r="7" fill="#ecf0f1" stroke="#2d3436" stroke-width="2"/>
  <circle cx="50" cy="56" r="1.5" fill="#2d3436"/>
</svg>
