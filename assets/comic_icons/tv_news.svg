<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <line x1="38" y1="10" x2="32" y2="22" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="10" x2="64" y2="22" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="38" cy="10" r="2" fill="#2d3436"/>
  <circle cx="58" cy="10" r="2" fill="#2d3436"/>
  <!-- TV body -->
  <rect x="12" y="22" width="76" height="56" rx="6" fill="#636e72" stroke="#2d3436" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="18" y="28" width="64" height="44" rx="2" fill="#b0d8ef" stroke="#2d3436" stroke-width="1.5"/>
  <!-- NEWS label and article lines -->
  <text x="50" y="46" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2d3436" text-anchor="middle">NEWS</text>
  <line x1="24" y1="52" x2="76" y2="52" stroke="#2d3436" stroke-width="1"/>
  <line x1="24" y1="56" x2="60" y2="56" stroke="#2d3436" stroke-width="1"/>
  <!-- Red LIVE ticker -->
  <rect x="18" y="62" width="64" height="10" fill="#e74c3c"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#fff" text-anchor="middle">LIVE • 속보</text>
  <!-- Stand -->
  <rect x="44" y="78" width="12" height="4" fill="#2d3436"/>
  <rect x="32" y="82" width="36" height="4" rx="1" fill="#636e72" stroke="#2d3436" stroke-width="2"/>
</svg>
