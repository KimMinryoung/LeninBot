<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(-12 50 50)">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="32" fill="none" stroke="#c0392b" stroke-width="3"/>
    <!-- Inner ring -->
    <circle cx="50" cy="50" r="26" fill="none" stroke="#c0392b" stroke-width="2"/>
    <!-- Korean + English stamp text -->
    <text x="50" y="48" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="#c0392b" text-anchor="middle">제재</text>
    <text x="50" y="62" font-family="system-ui, sans-serif" font-size="6" font-weight="800" fill="#c0392b" text-anchor="middle">SANCTIONED</text>
    <!-- Ink splatter for stamped feel -->
    <circle cx="20" cy="22" r="2" fill="#c0392b"/>
    <circle cx="80" cy="24" r="1.5" fill="#c0392b"/>
    <circle cx="22" cy="80" r="1.5" fill="#c0392b"/>
    <circle cx="82" cy="76" r="2" fill="#c0392b"/>
  </g>
</svg>
