services:
  neo4j:
    image: neo4j:5-community
    container_name: leninbot-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"   # Browser (localhost only)
      - "127.0.0.1:7687:7687"   # Bolt (localhost only)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_LOCAL_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_LOCAL_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: leninbot-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
