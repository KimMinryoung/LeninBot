<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Novel Writer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --surface: #fffdf8;
      --panel: #ecefed;
      --ink: #171814;
      --muted: #60665f;
      --line: #d6d9d4;
      --accent: #235c55;
      --accent-soft: #e7f0ec;
      --warn: #8a3d3d;
      --gold: #b8832f;
      --shadow: 0 10px 28px rgba(24, 26, 22, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.48 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 34px;
      padding: 0 11px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.danger { color: var(--warn); }
    button:disabled { opacity: .52; cursor: not-allowed; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      padding: 9px 10px;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184, 131, 47, .18); }
    textarea { resize: vertical; }
    .app {
      display: grid;
      grid-template-columns: 280px minmax(520px, 1fr) 390px;
      min-height: 100vh;
    }
    .sidebar, .assistant {
      min-width: 0;
      background: var(--panel);
      padding: 15px;
    }
    .sidebar { border-right: 1px solid var(--line); }
    .assistant { border-left: 1px solid var(--line); display: grid; grid-template-rows: auto auto auto auto minmax(160px, 1fr) auto auto; gap: 12px; }
    .editor {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--surface);
    }
    .topbar, .editor-actions, .composer {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
    }
    .editor-actions { border-top: 1px solid var(--line); border-bottom: 0; background: #faf8f2; }
    .composer { border: 0; padding: 0; }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 18px; font-weight: 700; }
    h2 { font-size: 12px; color: var(--muted); font-weight: 800; text-transform: uppercase; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .meta, .status { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .stack { display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .row.grow > :first-child { flex: 1; }
    .project-list { display: grid; gap: 8px; margin-top: 14px; }
    .project {
      display: grid;
      gap: 2px;
      align-content: center;
      min-height: 56px;
      width: 100%;
      text-align: left;
      background: rgba(255, 255, 255, .66);
    }
    .project.active { border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
    .project strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project.trash-item { border: 1px solid var(--line); border-radius: 6px; padding: 9px 11px; cursor: default; }
    .project.trash-item .row { margin-top: 6px; }
    .project.trash-item .danger { border-color: var(--warn); }
    .manuscript-shell {
      position: relative;
      min-height: 680px;
      min-width: 0;
      background: var(--surface);
    }
    /* The backdrop mirrors the textarea's text metrics exactly so <mark>
       rectangles line up with the (transparent-backgrounded) textarea text. */
    .manuscript, .manuscript-backdrop {
      padding: 22px 26px;
      font: 16px/1.72 ui-serif, Georgia, "Times New Roman", serif;
      letter-spacing: normal;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .manuscript {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      resize: none;
    }
    .manuscript-backdrop {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      scrollbar-width: none;
      color: transparent;
      pointer-events: none;
    }
    .manuscript-backdrop::-webkit-scrollbar { display: none; }
    .manuscript-backdrop mark {
      background: rgba(184, 131, 47, .30);
      color: transparent;
      border-radius: 2px;
    }
    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px 8px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .pager .row { flex: 0 0 auto; flex-wrap: wrap; max-width: 100%; }
    .pager-label { min-width: 0; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    .page-input { width: 58px; text-align: center; padding: 6px 4px; }
    .page-input::-webkit-outer-spin-button, .page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .page-input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    .project-fields textarea { min-height: 86px; }
    .conversation {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fbfaf6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .message.user { background: var(--accent-soft); }
    .message .label { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .prompt { min-height: 112px; }
    .search-results { display: grid; gap: 8px; max-height: 220px; overflow: auto; }
    .doc-list { display: grid; gap: 6px; max-height: 180px; overflow: auto; }
    .doc-content { min-height: 150px; }
    .result { width: 100%; text-align: left; height: auto; min-height: 54px; padding: 9px 10px; white-space: normal; }
    .result span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; overflow-wrap: anywhere; }
    .empty { color: var(--muted); text-align: center; padding: 28px 12px; }
    @media (max-width: 1120px) {
      .app { grid-template-columns: 1fr; }
      .sidebar, .assistant { border: 0; border-bottom: 1px solid var(--line); }
      .assistant { grid-template-rows: auto; }
      .editor { min-height: 72vh; }
      .manuscript-shell { min-height: 560px; }
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(23, 24, 20, .45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .modal h1 { font-size: 16px; }
    .modal .row { justify-content: flex-end; }
    .modal .danger { border-color: var(--warn); }
    @media (max-width: 720px) {
      .range-note { display: none; }
      .pager-label { flex: 1 1 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .editor-actions { padding: 9px 10px; }
      .editor-actions button { min-height: 32px; padding: 0 8px; }
      .page-input { width: 48px; padding: 5px 2px; }
    }
  </style>
</head>
<body>
  <div id="deleteModal" class="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h1 id="deleteModalTitle">Delete project?</h1>
      <div id="deleteModalBody" class="meta"></div>
      <div class="row">
        <button id="deleteModalCancel" type="button">Cancel</button>
        <button id="deleteModalConfirm" class="danger" type="button">Delete permanently</button>
      </div>
    </div>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="stack">
        <div>
          <h1>Novel Writer</h1>
          <div class="meta">Model choice persists across sessions · one manuscript per project</div>
        </div>
        <div class="row">
          <button id="newProject" class="primary" type="button">New</button>
          <button id="refresh" type="button">Refresh</button>
          <button id="trashToggle" type="button">Trash</button>
        </div>
      </div>
      <div id="projectList" class="project-list"></div>
    </aside>

    <main class="editor">
      <header class="topbar">
        <h1 id="projectTitle">No project selected</h1>
        <div id="projectMeta" class="meta">Create or select a project.</div>
      </header>
      <div class="manuscript-shell">
        <div id="manuscriptBackdrop" class="manuscript-backdrop" aria-hidden="true"></div>
        <textarea id="manuscript" class="manuscript" spellcheck="true" placeholder="Manuscript"></textarea>
      </div>
      <footer class="editor-actions">
        <div class="pager">
          <div id="manuscriptStatus" class="status pager-label"></div>
          <div class="row">
            <button id="manuscriptFirst" type="button" title="First page">⏮</button>
            <button id="manuscriptPrev" type="button">Prev</button>
            <input id="manuscriptPageInput" class="page-input" type="number" min="1" inputmode="numeric" title="Go to page">
            <span id="manuscriptPageTotal" class="meta"></span>
            <button id="manuscriptNext" type="button">Next</button>
            <button id="manuscriptLast" type="button" title="Last page">⏭</button>
            <button id="saveManuscript" class="primary" type="button">Save Manuscript</button>
          </div>
        </div>
      </footer>
    </main>

    <aside class="assistant">
      <section class="stack project-fields">
        <h2>Project</h2>
        <label>Title<input id="title" type="text" placeholder="Novel title"></label>
        <label>Premise<textarea id="premise" placeholder="Premise"></textarea></label>
        <label>Style Notes<textarea id="styleNotes" placeholder="Style, POV, continuity"></textarea></label>
        <div class="row">
          <button id="saveProject" class="primary" type="button">Save</button>
          <button id="deleteProject" class="danger" type="button">Delete</button>
        </div>
      </section>

      <section class="stack">
        <h2>Documents</h2>
        <div id="docList" class="doc-list"></div>
        <div class="row">
          <button id="newDoc" type="button">New Document</button>
        </div>
        <div id="docEditor" class="stack" style="display:none">
          <label>Title<input id="docTitle" type="text" placeholder="Document title"></label>
          <label>Kind<input id="docKind" type="text" placeholder="character / setting / outline / research / note"></label>
          <label>Content<textarea id="docContent" class="doc-content" placeholder="Background reference content (not part of the manuscript)"></textarea></label>
          <div class="row">
            <button id="saveDoc" class="primary" type="button">Save</button>
            <button id="pinDoc" type="button" title="Pinned documents are given to the AI in full every turn">Pin</button>
            <button id="deleteDoc" class="danger" type="button">Delete</button>
            <button id="closeDoc" type="button">Close</button>
          </div>
          <div id="docStatus" class="meta"></div>
        </div>
      </section>

      <section class="stack">
        <h2>Search</h2>
        <div class="row grow">
          <input id="searchQuery" type="search" placeholder="Search manuscript">
          <button id="search" type="button">Search</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </section>

      <section class="stack cost-panel">
        <h2>Cost</h2>
        <div id="costSummary" class="meta">No completed model call yet.</div>
        <div id="costUsage" class="meta"></div>
        <div id="costPricing" class="meta"></div>
      </section>

      <section id="conversation" class="conversation">
        <div class="empty">No messages yet.</div>
      </section>
      <section class="pager">
        <div id="conversationStatus" class="pager-label">No messages</div>
        <div class="row">
          <button id="conversationFirst" type="button" title="First page">⏮</button>
          <button id="conversationPrev" type="button">Prev</button>
          <button id="conversationNext" type="button">Next</button>
          <button id="conversationLast" type="button" title="Last page">⏭</button>
        </div>
      </section>

      <section class="composer stack">
        <div id="selectionInfo" class="meta" style="display:none"></div>
        <textarea id="prompt" class="prompt" placeholder="Request"></textarea>
        <div class="row">
          <label for="modelSelect" class="meta">Model</label>
          <select id="modelSelect"></select>
        </div>
        <div class="row">
          <button id="send" class="primary" type="button">Send</button>
          <button id="stop" type="button" disabled>Stop</button>
        </div>
        <div id="status" class="status"></div>
      </section>
    </aside>
  </div>

  <script>
    const MANUSCRIPT_PAGE_CHARS = 12000;
    const CONVERSATION_PAGE_SIZE = 8;
    const state = {
      projects: [],
      current: null,
      manuscript: '',
      savedManuscript: '',
      manuscriptPage: 0,
      manuscriptPageStart: 0,
      manuscriptPageEnd: 0,
      conversationMessages: [],
      conversationPage: 0,
      documents: [],
      editingDoc: null,
      aiEdits: [],
      view: 'active',
      trashedProjects: [],
      pendingDelete: null,
      abort: null,
      resuming: false,
      lastAssistant: '',
      model: null,
      models: [],
      modelChoice: null,
      lastCost: null,
    };
    const $ = (id) => document.getElementById(id);
    const writerBase = window.location.pathname.startsWith('/api/proxy/writer') ? '/api/proxy/writer' : '/writer';
    const writerPath = (path) => path.startsWith('/writer') ? writerBase + path.slice('/writer'.length) : path;
    const api = async (path, options = {}) => {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      const res = await fetch(writerPath(path), { ...options, headers, credentials: 'same-origin' });
      if (!res.ok) throw new Error(await res.text() || res.statusText);
      return res;
    };
    const setStatus = (text) => { $('status').textContent = text || ''; };
    const setManuscriptStatus = (text) => { $('manuscriptStatus').textContent = text || ''; };
    const fmtMoney = (value) => value == null ? '' : `$${Number(value).toFixed(4)}`;
    const fmtCost = (value) => value == null ? '' : ` · ${fmtMoney(value)}`;
    const fmtUsage = (usage = {}) => {
      const read = Number(usage.cache_read_input_tokens || 0);
      const write = Number(usage.cache_creation_input_tokens || 0);
      if (!read && !write) return '';
      return ` · cache read ${read.toLocaleString()} / write ${write.toLocaleString()}`;
    };
    const tokenMeta = (usage = {}) => {
      const input = Number(usage.input_tokens || 0);
      const output = Number(usage.output_tokens || 0);
      const read = Number(usage.cache_read_input_tokens || 0);
      const write = Number(usage.cache_creation_input_tokens || 0);
      return `input ${input.toLocaleString()} · output ${output.toLocaleString()} · cache read ${read.toLocaleString()} · cache write ${write.toLocaleString()}`;
    };
    const charMeta = (count) => `${Number(count || 0).toLocaleString()} chars`;
    const pageCount = (length, size) => Math.max(1, Math.ceil(Number(length || 0) / size));
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function manuscriptPageBounds(page = state.manuscriptPage) {
      const start = page * MANUSCRIPT_PAGE_CHARS;
      const end = Math.min(state.manuscript.length, start + MANUSCRIPT_PAGE_CHARS);
      return { start, end };
    }

    function commitVisibleManuscriptPage() {
      if (!state.current) return;
      const bounds = {
        start: state.manuscriptPageStart,
        end: state.manuscriptPageEnd,
      };
      const visible = $('manuscript').value;
      state.manuscript = state.manuscript.slice(0, bounds.start) + visible + state.manuscript.slice(bounds.end);
      state.manuscriptPageStart = bounds.start;
      state.manuscriptPageEnd = bounds.start + visible.length;
      state.manuscriptPage = clamp(state.manuscriptPage, 0, pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS) - 1);
    }

    function renderManuscriptPage() {
      const total = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS);
      state.manuscriptPage = clamp(state.manuscriptPage, 0, total - 1);
      const bounds = manuscriptPageBounds();
      state.manuscriptPageStart = bounds.start;
      state.manuscriptPageEnd = bounds.end;
      $('manuscript').value = state.manuscript.slice(bounds.start, bounds.end);
      updateManuscriptStatus();
      updateSelectionInfo();
      renderManuscriptBackdrop();
    }

    const escapeHtml = (text) => text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function renderManuscriptBackdrop() {
      const backdrop = $('manuscriptBackdrop');
      const text = $('manuscript').value;
      const pageStart = state.manuscriptPageStart;
      const ranges = (state.aiEdits || [])
        .map((edit) => ({
          start: clamp(edit.start - pageStart, 0, text.length),
          end: clamp(edit.end - pageStart, 0, text.length),
        }))
        .filter((edit) => edit.end > edit.start)
        .sort((a, b) => a.start - b.start);
      if (!ranges.length) { backdrop.innerHTML = ''; return; }
      let html = '';
      let pos = 0;
      for (const range of ranges) {
        const start = Math.max(range.start, pos);
        if (range.end <= start) continue;
        html += escapeHtml(text.slice(pos, start)) + '<mark>' + escapeHtml(text.slice(start, range.end)) + '</mark>';
        pos = range.end;
      }
      html += escapeHtml(text.slice(pos));
      backdrop.innerHTML = html;
      backdrop.scrollTop = $('manuscript').scrollTop;
    }

    function clearAiEdits() {
      if (!state.aiEdits.length) return;
      state.aiEdits = [];
      renderManuscriptBackdrop();
    }

    function jumpToAiEdits() {
      if (!state.current || !state.aiEdits.length) return;
      // Same page move as goManuscriptPageTo, but without stealing focus —
      // the user may already be typing the next request.
      const first = state.aiEdits.reduce((a, b) => (a.start <= b.start ? a : b));
      commitVisibleManuscriptPage();
      const total = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS);
      state.manuscriptPage = clamp(Math.floor(Math.max(0, first.start) / MANUSCRIPT_PAGE_CHARS), 0, total - 1);
      renderManuscriptPage();
      const backdrop = $('manuscriptBackdrop');
      const mark = backdrop.querySelector('mark');
      if (mark) {
        const manuscript = $('manuscript');
        manuscript.scrollTop = Math.max(0, mark.offsetTop - manuscript.clientHeight / 3);
        backdrop.scrollTop = manuscript.scrollTop;
      }
      updateManuscriptStatus(`AI edited ${state.aiEdits.length} range${state.aiEdits.length > 1 ? 's' : ''} (highlighted)`);
    }

    function changedEnvelope(oldText, newText) {
      if (oldText === newText) return null;
      const minLen = Math.min(oldText.length, newText.length);
      let prefix = 0;
      while (prefix < minLen && oldText[prefix] === newText[prefix]) prefix++;
      let suffix = 0;
      while (suffix < minLen - prefix && oldText[oldText.length - 1 - suffix] === newText[newText.length - 1 - suffix]) suffix++;
      return { start: prefix, end: Math.max(prefix, newText.length - suffix) };
    }

    function applyTurnEdits(ctx, preSendBody) {
      let edits = Array.isArray(ctx.edits) ? ctx.edits : [];
      if (!edits.length && typeof preSendBody === 'string' && preSendBody !== state.manuscript) {
        // Recovered without a final event (polling path): approximate with the
        // changed envelope between the pre-send and reloaded manuscript.
        const envelope = changedEnvelope(preSendBody, state.manuscript);
        if (envelope) edits = [{ action: 'edit', start: envelope.start, end: envelope.end }];
      }
      state.aiEdits = edits.filter((edit) => edit.end > edit.start);
      if (state.aiEdits.length) jumpToAiEdits();
      else renderManuscriptBackdrop();
    }

    function updateManuscriptStatus(label = '') {
      const pageInput = $('manuscriptPageInput');
      if (!state.current) {
        setManuscriptStatus('');
        pageInput.value = '';
        $('manuscriptPageTotal').textContent = '';
        for (const id of ['manuscriptFirst', 'manuscriptPrev', 'manuscriptNext', 'manuscriptLast']) $(id).disabled = true;
        pageInput.disabled = true;
        return;
      }
      const total = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS);
      const dirty = state.manuscript !== state.savedManuscript;
      const suffix = label || (dirty ? 'unsaved' : 'saved');
      const status = $('manuscriptStatus');
      status.innerHTML = '';
      const main = document.createElement('span');
      main.textContent = `${charMeta(state.manuscript.length)} · ${suffix}`;
      const range = document.createElement('span');
      range.className = 'range-note';
      range.textContent = ` · chars ${state.manuscriptPageStart.toLocaleString()}-${state.manuscriptPageEnd.toLocaleString()}`;
      status.append(main, range);
      if (document.activeElement !== pageInput) pageInput.value = String(state.manuscriptPage + 1);
      pageInput.max = String(total);
      pageInput.disabled = false;
      $('manuscriptPageTotal').textContent = `/ ${total}`;
      $('manuscriptFirst').disabled = state.manuscriptPage <= 0;
      $('manuscriptPrev').disabled = state.manuscriptPage <= 0;
      $('manuscriptNext').disabled = state.manuscriptPage >= total - 1;
      $('manuscriptLast').disabled = state.manuscriptPage >= total - 1;
    }

    function goManuscriptPageTo(page) {
      if (!state.current) return;
      commitVisibleManuscriptPage();
      const total = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS);
      state.manuscriptPage = clamp(page, 0, total - 1);
      renderManuscriptPage();
      $('manuscript').focus();
    }

    function goManuscriptPage(delta) {
      goManuscriptPageTo(state.manuscriptPage + delta);
    }

    function selectManuscriptRange(globalStart, globalEnd, options = {}) {
      if (options.commit !== false) commitVisibleManuscriptPage();
      const total = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS);
      state.manuscriptPage = clamp(Math.floor(Math.max(0, globalStart) / MANUSCRIPT_PAGE_CHARS), 0, total - 1);
      renderManuscriptPage();
      const bounds = manuscriptPageBounds();
      const localStart = clamp(globalStart - bounds.start, 0, $('manuscript').value.length);
      const localEnd = clamp(globalEnd - bounds.start, localStart, $('manuscript').value.length);
      $('manuscript').focus();
      $('manuscript').setSelectionRange(localStart, localEnd);
      updateSelectionInfo();
    }

    function selectedManuscriptRange() {
      return {
        start: state.manuscriptPageStart + $('manuscript').selectionStart,
        end: state.manuscriptPageStart + $('manuscript').selectionEnd,
      };
    }

    function renderCost() {
      if (state.lastCost) {
        $('costSummary').textContent = `${state.lastCost.model || 'Claude Fable 5'} · ${state.lastCost.stop || 'complete'} · ${fmtMoney(state.lastCost.cost) || 'cost unavailable'}`;
        $('costUsage').textContent = tokenMeta(state.lastCost.usage || {});
      } else {
        $('costSummary').textContent = 'No completed model call yet.';
        $('costUsage').textContent = '';
      }
      if (state.model) {
        $('costPricing').textContent = `pricing input $${Number(state.model.input_price_per_mtok || 0).toFixed(2)}/MTok · output $${Number(state.model.output_price_per_mtok || 0).toFixed(2)}/MTok`;
      }
    }

    function conversationPageTotal() {
      return pageCount(state.conversationMessages.length, CONVERSATION_PAGE_SIZE);
    }

    function renderConversationPage() {
      const conversation = $('conversation');
      conversation.innerHTML = '';
      const totalMessages = state.conversationMessages.length;
      const totalPages = conversationPageTotal();
      state.conversationPage = clamp(state.conversationPage, 0, totalPages - 1);
      if (!totalMessages) {
        conversation.innerHTML = '<div class="empty">No messages yet.</div>';
        $('conversationStatus').textContent = 'No messages';
        $('conversationFirst').disabled = true;
        $('conversationPrev').disabled = true;
        $('conversationNext').disabled = true;
        $('conversationLast').disabled = true;
        return null;
      }

      const start = state.conversationPage * CONVERSATION_PAGE_SIZE;
      const pageMessages = state.conversationMessages.slice(start, start + CONVERSATION_PAGE_SIZE);
      let lastBody = null;
      for (const message of pageMessages) {
        lastBody = renderMessageElement(message);
      }
      $('conversationStatus').textContent =
        `Messages ${start + 1}-${start + pageMessages.length} of ${totalMessages} · page ${state.conversationPage + 1}/${totalPages}`;
      $('conversationFirst').disabled = state.conversationPage <= 0;
      $('conversationPrev').disabled = state.conversationPage <= 0;
      $('conversationNext').disabled = state.conversationPage >= totalPages - 1;
      $('conversationLast').disabled = state.conversationPage >= totalPages - 1;
      conversation.scrollTop = conversation.scrollHeight;
      return lastBody;
    }

    function goConversationPage(delta) {
      state.conversationPage = clamp(state.conversationPage + delta, 0, conversationPageTotal() - 1);
      renderConversationPage();
    }

    function parseWriterContent(content) {
      const raw = content || '';
      const manuscriptMatch = raw.match(/<manuscript_delta>\s*([\s\S]*?)\s*<\/manuscript_delta>/i);
      const commentaryMatch = raw.match(/<commentary>\s*([\s\S]*?)\s*<\/commentary>/i);
      const manuscript = manuscriptMatch ? manuscriptMatch[1].trim() : '';
      const commentary = commentaryMatch ? commentaryMatch[1].trim() : '';
      if (!manuscriptMatch && !commentaryMatch) return { manuscript: raw.trim(), commentary: '', display: raw };
      const parts = [];
      if (manuscript) parts.push(`Manuscript\n${manuscript}`);
      if (commentary) parts.push(`Notes\n${commentary}`);
      return { manuscript, commentary, display: parts.join('\n\n') || raw };
    }

    function renderProjects() {
      const list = $('projectList');
      list.innerHTML = '';
      if (state.view === 'trash') {
        for (const project of state.trashedProjects) {
          const box = document.createElement('div');
          box.className = 'project trash-item';
          const title = document.createElement('strong');
          title.textContent = project.title;
          const meta = document.createElement('span');
          meta.className = 'meta';
          meta.textContent = `${charMeta(project.manuscript_char_count)} · ${project.message_count || 0} messages`;
          const actions = document.createElement('div');
          actions.className = 'row';
          const restore = document.createElement('button');
          restore.type = 'button';
          restore.textContent = 'Restore';
          restore.onclick = () => restoreProject(project.id);
          const purge = document.createElement('button');
          purge.type = 'button';
          purge.className = 'danger';
          purge.textContent = 'Delete forever';
          purge.onclick = () => openDeleteModal({
            id: project.id,
            title: project.title,
            permanent: true,
            chars: project.manuscript_char_count,
            messages: project.message_count || 0,
          });
          actions.append(restore, purge);
          box.append(title, meta, actions);
          list.appendChild(box);
        }
        if (!state.trashedProjects.length) list.innerHTML = '<div class="empty">Trash is empty.</div>';
        return;
      }
      for (const project of state.projects) {
        const button = document.createElement('button');
        button.className = 'project' + (state.current && state.current.id === project.id ? ' active' : '');
        button.innerHTML = '<strong></strong><span class="meta"></span>';
        button.querySelector('strong').textContent = project.title;
        button.querySelector('span').textContent = `${charMeta(project.manuscript_char_count)} · ${project.message_count || 0} messages`;
        button.onclick = () => loadProject(project.id);
        list.appendChild(button);
      }
    }

    async function loadTrash() {
      const res = await api('/writer/projects?status=deleted');
      state.trashedProjects = (await res.json()).projects || [];
    }

    async function toggleTrashView() {
      state.view = state.view === 'trash' ? 'active' : 'trash';
      $('trashToggle').textContent = state.view === 'trash' ? 'Back' : 'Trash';
      if (state.view === 'trash') {
        try {
          await loadTrash();
        } catch (err) {
          setStatus(`Could not load trash: ${err.message || err}`);
        }
      }
      renderProjects();
    }

    async function restoreProject(id) {
      await api(`/writer/projects/${id}/restore`, { method: 'POST' });
      await Promise.all([loadTrash(), loadProjects()]);
      renderProjects();
      setStatus('Project restored.');
    }

    function renderCurrent() {
      const project = state.current;
      if (!project) {
        $('projectTitle').textContent = 'No project selected';
        $('projectMeta').textContent = 'Create or select a project.';
        $('manuscript').value = '';
        state.manuscript = '';
        state.savedManuscript = '';
        state.manuscriptPage = 0;
        state.manuscriptPageStart = 0;
        state.manuscriptPageEnd = 0;
        state.conversationMessages = [];
        state.conversationPage = 0;
        $('title').value = '';
        $('premise').value = '';
        $('styleNotes').value = '';
        renderConversationPage();
        updateManuscriptStatus();
        return;
      }
      $('projectTitle').textContent = project.title;
      $('projectMeta').textContent = `Project #${project.id}`;
      $('title').value = project.title || '';
      $('premise').value = project.premise || '';
      $('styleNotes').value = project.style_notes || '';
      renderManuscriptPage();
      const messages = project.messages || [];
      let latestAssistant = '';
      state.conversationMessages = messages.map((message) => ({
        role: message.role,
        content: message.content,
        meta: message,
      }));
      state.conversationPage = conversationPageTotal() - 1;
      for (const message of messages) {
        if (message.role === 'assistant') latestAssistant = parseWriterContent(message.content).manuscript || '';
      }
      renderConversationPage();
      if (!state.lastAssistant && latestAssistant) state.lastAssistant = latestAssistant;
      renderProjects();
      updateAssistantButtons();
    }

    function modelDisplayName(id) {
      if (!id) return (state.model && state.model.display_name) || 'Model';
      const m = (state.models || []).find((x) => x.id === id);
      return m ? m.display_name : id;
    }

    function renderMessageElement(message) {
      const box = document.createElement('article');
      box.className = `message ${message.role}`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = message.role === 'assistant'
        ? `${modelDisplayName(message.meta && message.meta.model)}${message.meta && message.meta.stop_reason ? ' · ' + message.meta.stop_reason : ''}${fmtCost(message.meta && message.meta.cost_usd)}`
        : 'You';
      const body = document.createElement('div');
      const parsed = message.role === 'assistant' ? parseWriterContent(message.content) : { display: message.content || '' };
      body.textContent = parsed.display || '';
      box.append(label, body);
      $('conversation').appendChild(box);
      return body;
    }

    function addMessage(role, content, meta = {}) {
      const message = { role, content: content || '', meta };
      state.conversationMessages.push(message);
      state.conversationPage = conversationPageTotal() - 1;
      renderConversationPage();
      return {
        message,
        setText(text) {
          message.content = text || '';
          const bodies = $('conversation').querySelectorAll('.message > div:last-child');
          const body = bodies[bodies.length - 1];
          if (body) body.textContent = text || '';
        },
        appendText(text) {
          message.content += text || '';
          const bodies = $('conversation').querySelectorAll('.message > div:last-child');
          const body = bodies[bodies.length - 1];
          if (body) body.textContent += text || '';
        },
      };
    }

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function readSse(res, onEvent) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop() || '';
        for (const part of parts) {
          const line = part.split('\n').find((l) => l.startsWith('data: '));
          if (!line) continue;
          onEvent(JSON.parse(line.slice(6)));
        }
      }
    }

    function handleWriterEvent(event, ctx) {
      if (event.type === 'user_saved') ctx.savedUserId = event.message_id || ctx.savedUserId;
      if (event.type === 'no_active_run') ctx.noActiveRun = true;
      if (event.type === 'run_status') {
        ctx.savedUserId = ctx.savedUserId || event.user_message_id || null;
        if (typeof event.text_snapshot === 'string' && event.text_snapshot) {
          ctx.assistantMessage.setText(event.text_snapshot);
          state.lastAssistant = event.text_snapshot;
        }
      }
      if (event.type === 'text_delta') {
        ctx.assistantMessage.appendText(event.content);
        state.lastAssistant += event.content;
      }
      if ((event.type === 'done' || event.type === 'error') && Array.isArray(event.edits)) {
        ctx.edits = event.edits;
      }
      if (event.type === 'done') {
        ctx.finalSeen = true;
        if (event.display_text) ctx.assistantMessage.setText(event.display_text);
        state.lastAssistant = event.manuscript_text || state.lastAssistant;
        state.lastCost = {
          model: event.model_display || event.model,
          stop: event.stop_reason || 'complete',
          cost: event.cost_usd,
          usage: event.usage || {}
        };
        renderCost();
        setStatus(`${event.model_display || event.model} · ${event.stop_reason || 'complete'}${fmtCost(event.cost_usd)}${fmtUsage(event.usage)}`);
      }
      if (event.type === 'tool') setStatus(event.content);
      if (event.type === 'provider_retry') setStatus(event.content || 'Provider connection failed; retrying...');
      if (event.type === 'error') {
        ctx.finalSeen = true;
        setStatus(event.content || 'Request failed.');
      }
      $('conversation').scrollTop = $('conversation').scrollHeight;
    }

    async function reattachToRun(ctx, attempts = 4) {
      if (!state.current) return false;
      const projectId = state.current.id;
      for (let attempt = 0; attempt < attempts && !ctx.finalSeen; attempt++) {
        await sleep(1500 * (attempt + 1));
        if (!state.current || state.current.id !== projectId) return false;
        try {
          setStatus(`Stream interrupted; reattaching to the running writer (attempt ${attempt + 1})...`);
          ctx.noActiveRun = false;
          const res = await api(`/writer/projects/${projectId}/stream`);
          await readSse(res, (event) => handleWriterEvent(event, ctx));
          if (ctx.noActiveRun) return false;
        } catch (err) {
          // transient; retry with backoff
        }
      }
      return ctx.finalSeen;
    }

    async function maybeResumeActiveRun() {
      // After a page reload, pick up a writer run that is still generating.
      if (!state.current || state.abort || state.resuming) return;
      state.resuming = true;
      const projectId = state.current.id;
      try {
        const res = await api(`/writer/projects/${projectId}/stream`);
        const ctx = { finalSeen: false, savedUserId: null, noActiveRun: false, assistantMessage: null };
        await readSse(res, (event) => {
          if (event.type === 'no_active_run') { ctx.noActiveRun = true; return; }
          if (!ctx.assistantMessage) {
            setStatus('Reattached to a writer run still in progress...');
            ctx.assistantMessage = addMessage('assistant', '', { model: event.model || null });
          }
          handleWriterEvent(event, ctx);
        });
        if (ctx.assistantMessage && !ctx.finalSeen) {
          await reattachToRun(ctx);
        }
        if (ctx.assistantMessage && ctx.finalSeen && state.current && state.current.id === projectId) {
          await loadProject(projectId);
          applyTurnEdits(ctx, null);
        }
      } catch (err) {
        // no active run or transient failure; the saved state is already shown
      } finally {
        state.resuming = false;
      }
    }

    async function waitForSavedAssistant(afterMessageId, timeoutMs = 240000) {
      if (!state.current) return null;
      const projectId = state.current.id;
      const started = Date.now();
      const afterId = Number(afterMessageId || 0);
      while (Date.now() - started < timeoutMs) {
        await new Promise((resolve) => setTimeout(resolve, 3500));
        try {
          const res = await api(`/writer/projects/${projectId}`);
          const project = await res.json();
          const messages = project.messages || [];
          const assistant = messages.find((message) =>
            message.role === 'assistant' && (!afterId || Number(message.id || 0) > afterId)
          );
          if (assistant) {
            await loadProject(projectId);
            return assistant;
          }
          const elapsed = Math.round((Date.now() - started) / 1000);
          setStatus(`Browser stream closed; server writer run is still active. Waiting for saved result... ${elapsed}s`);
        } catch (err) {
          const elapsed = Math.round((Date.now() - started) / 1000);
          setStatus(`Waiting for saved writer result after reconnect... ${elapsed}s`);
        }
      }
      return null;
    }

    function updateSelectionInfo() {
      const info = $('selectionInfo');
      if (!state.current) { info.style.display = 'none'; delete info.dataset.range; return; }
      const { start, end } = selectedManuscriptRange();
      if (start === end) { info.style.display = 'none'; info.innerHTML = ''; delete info.dataset.range; return; }
      const rangeKey = `${start}:${end}`;
      // Skip the DOM rebuild when the range is unchanged: the textarea's blur
      // fires before a click on the clear link lands, and replacing the anchor
      // node mid-click would swallow the click.
      if (info.dataset.range === rangeKey) return;
      info.dataset.range = rangeKey;
      info.innerHTML = '';
      const note = document.createElement('span');
      note.textContent = `Selected passage (chars ${start.toLocaleString()}–${end.toLocaleString()}) will be sent to the model as the revision target · `;
      const clear = document.createElement('a');
      clear.href = '#';
      clear.textContent = 'clear selection';
      info.append(note, clear);
      info.style.display = '';
    }

    function updateAssistantButtons() {
      // Manual apply was removed — the model now edits the manuscript directly
      // via tools. Kept as a guarded no-op for the callers that still invoke it.
      const append = $('appendAssistant');
      const replace = $('replaceSelection');
      if (!append && !replace) return;
      const hasAssistant = Boolean(state.lastAssistant.trim());
      const hasSelection = $('manuscript').selectionStart !== $('manuscript').selectionEnd;
      if (append) append.disabled = !state.current || !hasAssistant;
      if (replace) replace.disabled = !state.current || !hasAssistant || !hasSelection;
    }

    async function loadProjects() {
      const res = await api('/writer/projects');
      const data = await res.json();
      state.projects = data.projects || [];
      state.model = data.model || state.model;
      state.models = data.models || [];
      if (data.selected_model) state.modelChoice = data.selected_model;
      renderModels();
      renderProjects();
      renderCost();
    }

    function renderModels() {
      const sel = $('modelSelect');
      if (!sel) return;
      const models = state.models || [];
      if (!models.length) { sel.innerHTML = ''; return; }
      if (!state.modelChoice || !models.some((m) => m.key === state.modelChoice && m.available)) {
        const def = models.find((m) => m.default && m.available)
          || models.find((m) => m.available)
          || models[0];
        state.modelChoice = def ? def.key : null;
      }
      state.model = models.find((m) => m.key === state.modelChoice) || state.model;
      sel.innerHTML = '';
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m.key;
        const price = m.output_price_per_mtok != null ? ` ($${m.output_price_per_mtok}/Mtok out)` : '';
        opt.textContent = m.display_name + price + (m.available ? '' : ' — unavailable');
        opt.disabled = !m.available;
        if (m.key === state.modelChoice) opt.selected = true;
        sel.appendChild(opt);
      }
      sel.onchange = async () => {
        state.modelChoice = sel.value;
        state.model = models.find((m) => m.key === state.modelChoice) || state.model;
        renderCost();
        try {
          await api('/writer/settings', { method: 'PUT', body: JSON.stringify({ model: state.modelChoice }) });
        } catch (err) {
          setStatus(`Could not save model choice: ${err.message || err}`);
        }
      };
    }

    async function loadProject(id) {
      // Remember where the reader was so a reload (post-run refresh, recovery)
      // doesn't dump them back to page 1. Same project: stick to the last page
      // if they were on it (follow appended text), else hold the char offset.
      // Fresh project open: land on the last page, where writing continues.
      const prev = state.current && state.current.id === id
        ? {
            offset: state.manuscriptPageStart,
            wasLastPage: state.manuscriptPage >= pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS) - 1,
          }
        : null;
      if (!prev) state.aiEdits = [];
      const [projectRes, manuscriptRes] = await Promise.all([
        api(`/writer/projects/${id}`),
        api(`/writer/projects/${id}/manuscript`)
      ]);
      state.current = await projectRes.json();
      const manuscriptData = await manuscriptRes.json();
      state.manuscript = (manuscriptData.manuscript && manuscriptData.manuscript.body) || '';
      state.savedManuscript = state.manuscript;
      const lastPage = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS) - 1;
      if (!prev || prev.wasLastPage) {
        state.manuscriptPage = lastPage;
      } else {
        state.manuscriptPage = clamp(Math.floor(prev.offset / MANUSCRIPT_PAGE_CHARS), 0, lastPage);
      }
      state.manuscriptPageStart = 0;
      state.manuscriptPageEnd = 0;
      state.lastAssistant = '';
      $('searchResults').innerHTML = '';
      closeDocument();
      renderCurrent();
      await loadDocuments();
      maybeResumeActiveRun();
    }

    async function createProject() {
      const title = prompt('Project title');
      if (!title) return;
      const res = await api('/writer/projects', { method: 'POST', body: JSON.stringify({ title }) });
      const data = await res.json();
      await loadProjects();
      await loadProject(data.project.id);
    }

    async function saveProject() {
      if (!state.current) return;
      const body = JSON.stringify({ title: $('title').value, premise: $('premise').value, style_notes: $('styleNotes').value });
      const res = await api(`/writer/projects/${state.current.id}`, { method: 'PATCH', body });
      state.current = await res.json();
      await loadProjects();
      renderCurrent();
      setStatus('Project saved.');
    }

    function openDeleteModal(target) {
      state.pendingDelete = target;
      const body = $('deleteModalBody');
      body.innerHTML = '';
      const titleLine = document.createElement('div');
      const strong = document.createElement('strong');
      strong.textContent = target.title || 'Untitled';
      titleLine.append('Project: ', strong);
      const detail = document.createElement('div');
      if (target.permanent) {
        $('deleteModalTitle').textContent = 'Delete permanently?';
        detail.textContent =
          `This permanently deletes the manuscript (${charMeta(target.chars)}), ` +
          `${target.messages || 0} conversation message${(target.messages || 0) === 1 ? '' : 's'}, ` +
          'all background documents, and all revision history. This cannot be undone.';
        $('deleteModalConfirm').textContent = 'Delete permanently';
      } else {
        $('deleteModalTitle').textContent = 'Move to Trash?';
        detail.textContent =
          'Everything is kept — the manuscript, conversation, documents, and revision history. '
          + 'You can restore the project from Trash at any time.';
        $('deleteModalConfirm').textContent = 'Move to Trash';
      }
      body.append(titleLine, detail);
      $('deleteModalConfirm').disabled = false;
      $('deleteModal').classList.add('open');
      $('deleteModalCancel').focus();
    }

    function closeDeleteModal() {
      $('deleteModal').classList.remove('open');
      state.pendingDelete = null;
    }

    async function confirmDeleteProject() {
      const target = state.pendingDelete;
      if (!target) { closeDeleteModal(); return; }
      $('deleteModalConfirm').disabled = true;
      try {
        await api(`/writer/projects/${target.id}${target.permanent ? '?permanent=true' : ''}`, { method: 'DELETE' });
      } catch (err) {
        $('deleteModalConfirm').disabled = false;
        setStatus(`Delete failed: ${err.message || err}`);
        return;
      }
      closeDeleteModal();
      if (state.current && state.current.id === target.id) {
        state.current = null;
        state.manuscript = '';
        state.savedManuscript = '';
        state.manuscriptPage = 0;
        state.lastAssistant = '';
        state.aiEdits = [];
        closeDocument();
        renderCurrent();
        await loadDocuments();
      }
      await loadProjects();
      if (state.view === 'trash') await loadTrash();
      renderProjects();
      setStatus(target.permanent ? 'Project permanently deleted.' : 'Project moved to Trash. Restore it from the Trash view if needed.');
    }

    async function saveManuscript(note = 'manual save') {
      if (!state.current) return;
      commitVisibleManuscriptPage();
      const body = state.manuscript;
      const res = await api(`/writer/projects/${state.current.id}/manuscript`, {
        method: 'PUT',
        body: JSON.stringify({ body, note })
      });
      const data = await res.json();
      state.manuscript = data.manuscript.body || '';
      state.savedManuscript = state.manuscript;
      renderManuscriptPage();
      await loadProjects();
      updateManuscriptStatus('saved');
    }

    function renderDocuments() {
      const list = $('docList');
      list.innerHTML = '';
      for (const doc of state.documents) {
        const button = document.createElement('button');
        button.className = 'result';
        button.type = 'button';
        button.innerHTML = '<strong></strong><span></span>';
        const pinned = (doc.kind || '') === 'pinned';
        button.querySelector('strong').textContent = (pinned ? '📌 ' : '') + doc.title;
        button.querySelector('span').textContent = `${doc.kind || 'note'} · ${charMeta(doc.char_count)}`;
        button.onclick = () => openDocument(doc.id);
        list.appendChild(button);
      }
      if (!state.documents.length) list.innerHTML = '<div class="meta">No background documents.</div>';
      $('newDoc').disabled = !state.current;
    }

    async function loadDocuments() {
      if (!state.current) {
        state.documents = [];
        renderDocuments();
        return;
      }
      const res = await api(`/writer/projects/${state.current.id}/documents`);
      const data = await res.json();
      state.documents = data.documents || [];
      renderDocuments();
    }

    async function openDocument(id) {
      if (!state.current) return;
      const res = await api(`/writer/projects/${state.current.id}/documents/${id}`);
      state.editingDoc = (await res.json()).document;
      $('docTitle').value = state.editingDoc.title || '';
      $('docKind').value = state.editingDoc.kind || 'note';
      $('docContent').value = state.editingDoc.content || '';
      $('docStatus').textContent = '';
      updatePinButton();
      $('docEditor').style.display = '';
    }

    function newDocument() {
      if (!state.current) return;
      state.editingDoc = null;
      $('docTitle').value = '';
      $('docKind').value = 'note';
      $('docContent').value = '';
      $('docStatus').textContent = '';
      updatePinButton();
      $('docEditor').style.display = '';
      $('docTitle').focus();
    }

    function closeDocument() {
      state.editingDoc = null;
      $('docEditor').style.display = 'none';
      $('docStatus').textContent = '';
    }

    function updatePinButton() {
      $('pinDoc').textContent = $('docKind').value.trim() === 'pinned' ? 'Unpin' : 'Pin';
    }

    async function togglePinDocument() {
      if (!state.current) return;
      $('docKind').value = $('docKind').value.trim() === 'pinned' ? 'note' : 'pinned';
      updatePinButton();
      await saveDocumentEdit();
    }

    async function saveDocumentEdit() {
      if (!state.current) return;
      const payload = {
        title: $('docTitle').value.trim(),
        kind: $('docKind').value.trim() || 'note',
        content: $('docContent').value
      };
      if (!payload.title) { $('docStatus').textContent = 'Title is required.'; return; }
      try {
        const path = state.editingDoc
          ? `/writer/projects/${state.current.id}/documents/${state.editingDoc.id}`
          : `/writer/projects/${state.current.id}/documents`;
        const res = await api(path, { method: state.editingDoc ? 'PUT' : 'POST', body: JSON.stringify(payload) });
        state.editingDoc = (await res.json()).document;
        $('docStatus').textContent = 'Saved.';
        await loadDocuments();
      } catch (err) {
        $('docStatus').textContent = `Save failed: ${err.message || err}`;
      }
    }

    async function deleteDocumentEdit() {
      if (!state.current || !state.editingDoc || !confirm('Delete this document?')) return;
      await api(`/writer/projects/${state.current.id}/documents/${state.editingDoc.id}`, { method: 'DELETE' });
      closeDocument();
      await loadDocuments();
    }

    async function searchManuscript() {
      if (!state.current || !$('searchQuery').value.trim()) return;
      const q = $('searchQuery').value.trim();
      const res = await api(`/writer/projects/${state.current.id}/manuscript/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      $('searchResults').innerHTML = '';
      for (const item of data.results || []) {
        const button = document.createElement('button');
        button.className = 'result';
        button.type = 'button';
        button.innerHTML = '<strong></strong><span></span>';
        button.querySelector('strong').textContent = item.heading || (item.chunk_index != null ? `Chunk ${item.chunk_index}` : 'Match');
        button.querySelector('span').textContent = item.snippet || '';
        button.onclick = () => {
          selectManuscriptRange(item.match_start || item.start_offset || 0, item.match_end || item.end_offset || 0);
          updateAssistantButtons();
        };
        $('searchResults').appendChild(button);
      }
      if (!$('searchResults').children.length) $('searchResults').innerHTML = '<div class="meta">No results.</div>';
    }

    async function appendAssistant() {
      if (!state.current || !state.lastAssistant.trim()) return;
      const res = await api(`/writer/projects/${state.current.id}/manuscript/append`, {
        method: 'POST',
        body: JSON.stringify({ text: state.lastAssistant, note: 'append assistant reply' })
      });
      const data = await res.json();
      state.manuscript = data.manuscript.body || '';
      state.savedManuscript = state.manuscript;
      state.manuscriptPage = pageCount(state.manuscript.length, MANUSCRIPT_PAGE_CHARS) - 1;
      renderManuscriptPage();
      await loadProjects();
      updateManuscriptStatus('appended');
    }

    async function replaceSelection() {
      if (!state.current || !state.lastAssistant.trim()) return;
      commitVisibleManuscriptPage();
      const { start, end } = selectedManuscriptRange();
      if (start === end) return;
      const res = await api(`/writer/projects/${state.current.id}/manuscript/replace`, {
        method: 'POST',
        body: JSON.stringify({ start, end, replacement: state.lastAssistant, note: 'replace selection with assistant reply' })
      });
      const data = await res.json();
      state.manuscript = data.manuscript.body || '';
      state.savedManuscript = state.manuscript;
      selectManuscriptRange(start, start + state.lastAssistant.length, { commit: false });
      await loadProjects();
      updateManuscriptStatus('replaced');
      updateAssistantButtons();
    }

    async function sendPrompt() {
      if (!state.current) { setStatus('Create or select a project first.'); return; }
      if (!$('prompt').value.trim()) return;
      // Persist unsaved title/premise/style before generating: the model reads
      // these from the saved project, and the post-send reload would otherwise
      // discard unsaved field text.
      const cur = state.current;
      if ($('title').value !== (cur.title || '') || $('premise').value !== (cur.premise || '') || $('styleNotes').value !== (cur.style_notes || '')) {
        try {
          const saved = await api(`/writer/projects/${cur.id}`, {
            method: 'PATCH',
            body: JSON.stringify({ title: $('title').value, premise: $('premise').value, style_notes: $('styleNotes').value })
          });
          state.current = await saved.json();
        } catch (err) {
          setStatus('Could not save project settings: ' + (err.message || err));
          return;
        }
      }
      // Persist unsaved manuscript edits so the model edits exactly what you see,
      // and the post-turn reload doesn't discard them.
      commitVisibleManuscriptPage();
      if (state.manuscript !== (state.savedManuscript || '')) {
        try {
          const mr = await api(`/writer/projects/${cur.id}/manuscript`, {
            method: 'PUT',
            body: JSON.stringify({ body: state.manuscript, note: 'autosave before generate' })
          });
          const md = await mr.json();
          state.manuscript = (md.manuscript && md.manuscript.body) || state.manuscript;
          state.savedManuscript = state.manuscript;
        } catch (err) {
          setStatus('Could not save manuscript: ' + (err.message || err));
          return;
        }
      }
      const promptText = $('prompt').value.trim();
      clearAiEdits();
      const preSendBody = state.manuscript;
      const { start, end } = selectedManuscriptRange();
      const baselineMessageId = Math.max(
        0,
        ...((state.current.messages || []).map((message) => Number(message.id || 0)))
      );
      $('prompt').value = '';
      addMessage('user', promptText);
      const selModel = (state.models || []).find((m) => m.key === state.modelChoice);
      const assistantMessage = addMessage('assistant', '', { model: selModel ? selModel.id : null });
      $('send').disabled = true;
      $('stop').disabled = false;
      state.abort = new AbortController();
      state.lastAssistant = '';
      const ctx = { finalSeen: false, savedUserId: null, noActiveRun: false, assistantMessage };
      setStatus('Streaming...');
      const payload = { prompt: promptText };
      if (state.modelChoice) payload.model = state.modelChoice;
      if (start !== end) {
        payload.selection_start = start;
        payload.selection_end = end;
      }
      try {
        const res = await api(`/writer/projects/${state.current.id}/messages`, {
          method: 'POST',
          signal: state.abort.signal,
          body: JSON.stringify(payload)
        });
        await readSse(res, (event) => handleWriterEvent(event, ctx));
        if (!ctx.finalSeen) {
          const recovered = await reattachToRun(ctx);
          if (!recovered) {
            const saved = await waitForSavedAssistant(ctx.savedUserId || baselineMessageId);
            if (saved) {
              const parsed = parseWriterContent(saved.content);
              state.lastAssistant = parsed.manuscript || state.lastAssistant;
              setStatus('Recovered saved writer result after stream reconnect.');
            }
          }
        }
        const assistantText = state.lastAssistant;
        await loadProject(state.current.id);
        state.lastAssistant = assistantText;
        applyTurnEdits(ctx, preSendBody);
        updateAssistantButtons();
      } catch (err) {
        if (err.name === 'AbortError') {
          setStatus('Stopped watching this stream. The server-side writer run may still finish and save.');
        } else {
          const recovered = await reattachToRun(ctx);
          if (recovered) {
            const assistantText = state.lastAssistant;
            await loadProject(state.current.id);
            state.lastAssistant = assistantText;
            applyTurnEdits(ctx, preSendBody);
          } else {
            const saved = await waitForSavedAssistant(ctx.savedUserId || baselineMessageId);
            if (saved) {
              const parsed = parseWriterContent(saved.content);
              state.lastAssistant = parsed.manuscript || state.lastAssistant;
              applyTurnEdits(ctx, preSendBody);
              setStatus('Connection dropped, but the server finished and saved the writer result.');
            } else {
              try {
                await loadProject(state.current.id);
                setStatus('Connection dropped while the server was still writing. No saved result was found yet; refresh again in a moment.');
              } catch (reloadErr) {
                setStatus(`Connection dropped and saved state could not be reloaded: ${reloadErr.message || reloadErr}`);
              }
            }
          }
        }
      } finally {
        $('send').disabled = false;
        $('stop').disabled = true;
        state.abort = null;
        updateAssistantButtons();
      }
    }

    $('newProject').onclick = createProject;
    $('refresh').onclick = loadProjects;
    $('saveProject').onclick = saveProject;
    $('deleteProject').onclick = () => {
      if (!state.current) return;
      openDeleteModal({ id: state.current.id, title: state.current.title, permanent: false });
    };
    $('trashToggle').onclick = toggleTrashView;
    $('deleteModalCancel').onclick = closeDeleteModal;
    $('deleteModalConfirm').onclick = confirmDeleteProject;
    $('deleteModal').addEventListener('click', (event) => {
      if (event.target === $('deleteModal')) closeDeleteModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && $('deleteModal').classList.contains('open')) closeDeleteModal();
    });
    $('saveManuscript').onclick = () => saveManuscript();
    $('manuscriptFirst').onclick = () => goManuscriptPageTo(0);
    $('manuscriptPrev').onclick = () => goManuscriptPage(-1);
    $('manuscriptNext').onclick = () => goManuscriptPage(1);
    $('manuscriptLast').onclick = () => goManuscriptPageTo(Number.MAX_SAFE_INTEGER);
    const jumpToTypedPage = () => {
      const page = parseInt($('manuscriptPageInput').value, 10);
      if (Number.isFinite(page)) goManuscriptPageTo(page - 1);
    };
    $('manuscriptPageInput').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') { event.preventDefault(); jumpToTypedPage(); }
    });
    $('manuscriptPageInput').addEventListener('blur', jumpToTypedPage);
    $('conversationFirst').onclick = () => goConversationPage(-Number.MAX_SAFE_INTEGER);
    $('conversationPrev').onclick = () => goConversationPage(-1);
    $('conversationNext').onclick = () => goConversationPage(1);
    $('conversationLast').onclick = () => goConversationPage(Number.MAX_SAFE_INTEGER);
    $('search').onclick = searchManuscript;
    $('newDoc').onclick = newDocument;
    $('saveDoc').onclick = saveDocumentEdit;
    $('pinDoc').onclick = togglePinDocument;
    $('deleteDoc').onclick = deleteDocumentEdit;
    $('closeDoc').onclick = closeDocument;
    $('docKind').addEventListener('input', updatePinButton);
    $('send').onclick = sendPrompt;
    $('stop').onclick = () => state.abort && state.abort.abort();
    $('prompt').addEventListener('keydown', (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') sendPrompt();
    });
    $('searchQuery').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') searchManuscript();
    });
    $('manuscript').addEventListener('input', () => {
      commitVisibleManuscriptPage();
      updateManuscriptStatus('unsaved');
      clearAiEdits();
    });
    $('manuscript').addEventListener('scroll', () => {
      $('manuscriptBackdrop').scrollTop = $('manuscript').scrollTop;
    });
    $('selectionInfo').addEventListener('click', (event) => {
      if (!event.target.closest('a')) return;
      event.preventDefault();
      // Focus BEFORE collapsing: Chromium restores an unfocused textarea's
      // remembered selection on refocus, which would undo the collapse.
      const manuscript = $('manuscript');
      manuscript.focus();
      manuscript.setSelectionRange(manuscript.selectionEnd, manuscript.selectionEnd);
      updateSelectionInfo();
      updateAssistantButtons();
    });
    const onManuscriptSelectionChange = () => { updateAssistantButtons(); updateSelectionInfo(); };
    $('manuscript').addEventListener('select', onManuscriptSelectionChange);
    $('manuscript').addEventListener('keyup', onManuscriptSelectionChange);
    $('manuscript').addEventListener('mouseup', onManuscriptSelectionChange);
    $('manuscript').addEventListener('blur', updateSelectionInfo);
    renderDocuments();
    loadProjects().catch((err) => setStatus(String(err.message || err)));
  </script>
</body>
</html>
