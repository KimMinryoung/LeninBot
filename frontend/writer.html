<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Fable Writer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f2ec;
      --surface: #fffefa;
      --panel: #e9ece7;
      --text: #171814;
      --muted: #64685f;
      --line: #d5d9d1;
      --accent: #235c55;
      --accent-2: #8a3d3d;
      --focus: #c7953d;
      --shadow: 0 14px 40px rgba(21, 24, 18, 0.11);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 6px;
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.danger { color: var(--accent-2); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: var(--focus); box-shadow: 0 0 0 3px rgba(199, 149, 61, .18); }
    .app {
      display: grid;
      grid-template-columns: 290px minmax(420px, 1fr) 340px;
      min-height: 100vh;
    }
    .sidebar, .notes {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 16px;
      min-width: 0;
    }
    .notes { border-right: 0; border-left: 1px solid var(--line); }
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background: var(--surface);
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 18px; font-weight: 700; }
    h2 { font-size: 13px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .meta { color: var(--muted); font-size: 12px; }
    .stack { display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { min-width: 0; }
    .project-list { display: grid; gap: 8px; margin-top: 14px; }
    .project {
      text-align: left;
      min-height: 54px;
      display: grid;
      align-content: center;
      gap: 2px;
      background: rgba(255,255,255,.62);
    }
    .project.active { border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
    .project strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .messages {
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      max-width: 900px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: #fbfaf6;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .message.user { align-self: flex-end; background: #eef3ef; width: min(760px, 90%); }
    .message.assistant { align-self: flex-start; width: min(900px, 96%); }
    .message .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .composer {
      border-top: 1px solid var(--line);
      padding: 14px 18px 18px;
      background: #f8f7f2;
    }
    .composer textarea { min-height: 116px; }
    .fields { display: grid; gap: 12px; margin-top: 14px; }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .empty {
      margin: auto;
      max-width: 460px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar, .notes { border: 0; border-bottom: 1px solid var(--line); }
      .main { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="stack">
        <div>
          <h1>Fable Writer</h1>
          <div class="meta">Claude Fable 5 · private sessions</div>
        </div>
        <div class="row">
          <button id="newProject" class="primary" type="button">New</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </div>
      <div id="projectList" class="project-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="projectTitle">No project selected</h1>
          <div id="projectMeta" class="meta">Create or select a writing project.</div>
        </div>
        <div class="row">
          <select id="mode" title="Mode">
            <option value="draft">Draft</option>
            <option value="continue">Continue</option>
            <option value="revise">Revise</option>
            <option value="plan">Plan</option>
            <option value="critique">Critique</option>
          </select>
          <select id="maxTokens" title="Max output">
            <option value="2048">2K</option>
            <option value="4096" selected>4K</option>
            <option value="8192">8K</option>
            <option value="16000">16K</option>
          </select>
        </div>
      </header>
      <section id="messages" class="messages">
        <div class="empty">Select a project to begin.</div>
      </section>
      <section class="composer">
        <div class="stack">
          <textarea id="prompt" placeholder="Write the next request..."></textarea>
          <div class="row">
            <button id="send" class="primary" type="button">Send</button>
            <button id="stop" type="button" disabled>Stop</button>
            <div id="status" class="status"></div>
          </div>
        </div>
      </section>
    </main>

    <aside class="notes">
      <div class="stack">
        <h2>Project</h2>
        <label>Title<input id="title" type="text" placeholder="Novel title"></label>
        <label>Premise<textarea id="premise" placeholder="Core situation, characters, stakes"></textarea></label>
        <label>Style Notes<textarea id="styleNotes" placeholder="Voice, POV, tense, continuity rules"></textarea></label>
        <div class="row">
          <button id="saveProject" class="primary" type="button">Save</button>
          <button id="deleteProject" class="danger" type="button">Delete</button>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const state = { projects: [], current: null, abort: null };
    const $ = (id) => document.getElementById(id);
    const writerBase = window.location.pathname.startsWith('/api/proxy/writer') ? '/api/proxy/writer' : '/writer';
    const writerPath = (path) => path.startsWith('/writer') ? writerBase + path.slice('/writer'.length) : path;
    const api = async (path, options = {}) => {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      const res = await fetch(writerPath(path), { ...options, headers, credentials: 'same-origin' });
      if (!res.ok) throw new Error(await res.text() || res.statusText);
      return res;
    };
    const setStatus = (text) => { $('status').textContent = text || ''; };
    const fmtCost = (value) => value == null ? '' : ` · $${Number(value).toFixed(4)}`;

    function renderProjects() {
      $('projectList').innerHTML = '';
      for (const project of state.projects) {
        const button = document.createElement('button');
        button.className = 'project' + (state.current && state.current.id === project.id ? ' active' : '');
        button.innerHTML = `<strong></strong><span class="meta"></span>`;
        button.querySelector('strong').textContent = project.title;
        button.querySelector('span').textContent = `${project.message_count || 0} messages`;
        button.onclick = () => loadProject(project.id);
        $('projectList').appendChild(button);
      }
    }

    function renderCurrent() {
      const project = state.current;
      $('messages').innerHTML = '';
      if (!project) {
        $('projectTitle').textContent = 'No project selected';
        $('projectMeta').textContent = 'Create or select a writing project.';
        $('messages').innerHTML = '<div class="empty">Select a project to begin.</div>';
        return;
      }
      $('projectTitle').textContent = project.title;
      $('projectMeta').textContent = `Project #${project.id}`;
      $('title').value = project.title || '';
      $('premise').value = project.premise || '';
      $('styleNotes').value = project.style_notes || '';
      const messages = project.messages || [];
      if (!messages.length) {
        $('messages').innerHTML = '<div class="empty">No messages yet.</div>';
      } else {
        for (const message of messages) addMessage(message.role, message.content, message);
      }
      renderProjects();
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function addMessage(role, content, meta = {}) {
      const box = document.createElement('article');
      box.className = `message ${role}`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'assistant'
        ? `Claude Fable 5${meta.stop_reason ? ' · ' + meta.stop_reason : ''}${fmtCost(meta.cost_usd)}`
        : 'You';
      const body = document.createElement('div');
      body.textContent = content || '';
      box.append(label, body);
      $('messages').appendChild(box);
      $('messages').scrollTop = $('messages').scrollHeight;
      return body;
    }

    async function loadProjects() {
      const res = await api('/writer/projects');
      const data = await res.json();
      state.projects = data.projects || [];
      renderProjects();
    }

    async function loadProject(id) {
      const res = await api(`/writer/projects/${id}`);
      state.current = await res.json();
      renderCurrent();
    }

    async function createProject() {
      const title = prompt('Project title');
      if (!title) return;
      const res = await api('/writer/projects', { method: 'POST', body: JSON.stringify({ title }) });
      const data = await res.json();
      await loadProjects();
      await loadProject(data.project.id);
    }

    async function saveProject() {
      if (!state.current) return;
      const body = JSON.stringify({ title: $('title').value, premise: $('premise').value, style_notes: $('styleNotes').value });
      const res = await api(`/writer/projects/${state.current.id}`, { method: 'PATCH', body });
      state.current = await res.json();
      await loadProjects();
      renderCurrent();
      setStatus('Saved.');
    }

    async function deleteProject() {
      if (!state.current || !confirm('Delete this project and all messages?')) return;
      await api(`/writer/projects/${state.current.id}`, { method: 'DELETE' });
      state.current = null;
      await loadProjects();
      renderCurrent();
      setStatus('Deleted.');
    }

    async function sendPrompt() {
      if (!state.current || !$('prompt').value.trim()) return;
      const promptText = $('prompt').value.trim();
      $('prompt').value = '';
      if ($('messages').querySelector('.empty')) $('messages').innerHTML = '';
      addMessage('user', promptText);
      const assistantBody = addMessage('assistant', '');
      $('send').disabled = true;
      $('stop').disabled = false;
      state.abort = new AbortController();
      setStatus('Streaming...');
      try {
        const res = await api(`/writer/projects/${state.current.id}/messages`, {
          method: 'POST',
          signal: state.abort.signal,
          body: JSON.stringify({ prompt: promptText, request_kind: $('mode').value, max_tokens: Number($('maxTokens').value) })
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const part of parts) {
            const line = part.split('\n').find((l) => l.startsWith('data: '));
            if (!line) continue;
            const event = JSON.parse(line.slice(6));
            if (event.type === 'text_delta') assistantBody.textContent += event.content;
            if (event.type === 'done') setStatus(`${event.model_display || event.model} · ${event.stop_reason || 'complete'}${fmtCost(event.cost_usd)}`);
            if (event.type === 'error') setStatus(event.content || 'Request failed.');
            $('messages').scrollTop = $('messages').scrollHeight;
          }
        }
        await loadProject(state.current.id);
      } catch (err) {
        if (err.name !== 'AbortError') setStatus(String(err.message || err));
      } finally {
        $('send').disabled = false;
        $('stop').disabled = true;
        state.abort = null;
      }
    }

    $('newProject').onclick = createProject;
    $('refresh').onclick = loadProjects;
    $('saveProject').onclick = saveProject;
    $('deleteProject').onclick = deleteProject;
    $('send').onclick = sendPrompt;
    $('stop').onclick = () => state.abort && state.abort.abort();
    $('prompt').addEventListener('keydown', (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') sendPrompt();
    });
    loadProjects().catch((err) => setStatus(String(err.message || err)));
  </script>
</body>
</html>
